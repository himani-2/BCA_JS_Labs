<!DOCTYPE html>
<html>
<head>
    <title>Lab2qn3</title>
</head>
<body>

    <h2>Find Smallest and Largest using While Loop</h2>
    <p id="result"></p>

    <script>
        let a = [2, 19, 37, 48, 45, 94, 12, 23, 78];

        let smallest = a[0];
        let largest = a[0];

        let i = 1;

        while (i < a.length) {
            if (a[i] < smallest) {
                smallest = a[i];
            }

            if (a[i] > largest) {
                largest = a[i];
            }

            i++;
        }

        document.getElementById("result").innerHTML =
            "Smallest Number = " + smallest + "<br>" +
            "Largest Number = " + largest;
    </script>

</body>
</html>
