<!DOCTYPE html>
<html>
<head>
    <title>Circumference of a Circle</title>
</head>
<body>

<script>
    let radius = Number(prompt("Enter the radius of the circle:"));

    let circumference = 2 * Math.PI * radius;

    alert("The circumference of the circle is: " + circumference.toFixed(2));
</script>

</body>
</html>
