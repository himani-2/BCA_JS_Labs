<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table of 7</title>
</head>
<body>
    <script>
        document.write("<h3>Multiplication Table of 7</h3>");

        for (let i = 1; i <= 10; i++) {
            document.write("7 × " + i + " = " + (7 * i) + "<br>");
        }
    </script>
</body>
</html>
