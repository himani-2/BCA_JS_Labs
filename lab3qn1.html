<!DOCTYPE html>
<html>
<head>
    <title>Count Zeros</title>
</head>
<body>

    <h2>Count Total Number of 0s in Array</h2>
    <button onclick="countZeros()">Find Zeros</button>

    <p id="result"></p>

    <script>
        function countZeros() {
            let a = [2, 5, 0, 0, 7, 5, 0, 1, 3, 0];
            let count = 0;

            for(let i = 0; i < a.length; i++) {
                if(a[i] === 0) {
                    count++;
                }
            }

            document.getElementById("result").innerHTML =
                "Total number of 0s = " + count;
        }
    </script>

</body>
</html>
